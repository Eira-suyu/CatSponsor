<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>喵助 · 校园流浪猫TNR平台</title>
  <style>
    /* ===== 全局重置 ===== */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      background: #f0f4fb;
      color: #1a2332;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 80px;
      min-height: 100vh;
    }
    #app {
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
      min-height: 100vh;
      position: relative;
      box-shadow: 0 0 40px rgba(0,20,40,0.06);
      overflow-x: hidden;
    }
    /* ===== 通用组件 ===== */
    .glass-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 32px rgba(74,144,226,0.06), 0 2px 8px rgba(0,0,0,0.02);
      padding: 16px;
      margin-bottom: 16px;
      transition: transform 0.2s, box-shadow 0.3s;
    }
    .glass-card:active { transform: scale(0.99); }
    .btn-primary {
      background: linear-gradient(135deg, #4A90E2, #7B5CFA);
      color: #fff;
      border: none;
      padding: 14px 20px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 8px 24px rgba(74,144,226,0.25);
      transition: all 0.3s;
      letter-spacing: 0.3px;
    }
    .btn-primary:active { transform: scale(0.96); box-shadow: 0 4px 12px rgba(74,144,226,0.2); }
    .badge-pill {
      display: inline-block;
      padding: 2px 12px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .btn-sm {
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: #eef2f7;
      color: #1a2332;
      transition: 0.2s;
    }
    .btn-sm:active { transform: scale(0.95); }
    .btn-sm.primary { background: #4A90E2; color: #fff; }
    .btn-sm.danger { background: #FF6B8B; color: #fff; }
    .btn-sm.success { background: #4CAF50; color: #fff; }
    /* ===== 头部 ===== */
    .header {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(232,233,234,0.3);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header .back {
      font-size: 28px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0 4px;
      transition: transform 0.2s;
      color: #1a2332;
    }
    .header .back:active { transform: scale(0.85); }
    .header .title {
      font-size: 20px;
      font-weight: 700;
      flex: 1;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #4A90E2, #FF6B8B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .action {
      font-size: 24px;
      cursor: pointer;
      background: none;
      border: none;
      position: relative;
      padding: 4px;
      color: #1a2332;
    }
    .header .badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: #FF6B8B;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      min-width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(255,107,139,0.3);
    }
    /* ===== 底部标签栏 ===== */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 420px;
      width: 100%;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(232,233,234,0.3);
      display: flex;
      justify-content: space-around;
      padding: 6px 0 env(safe-area-inset-bottom);
      z-index: 200;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: none;
      border: none;
      font-size: 10px;
      color: #8a99b4;
      padding: 4px 0;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      border-radius: 16px;
      padding: 4px 8px;
    }
    .tab-item .icon { font-size: 26px; line-height: 1.2; transition: transform 0.2s; }
    .tab-item.active { color: #4A90E2; background: rgba(74,144,226,0.06); }
    .tab-item.active .icon { transform: translateY(-2px); }
    .tab-item .badge {
      position: absolute;
      top: 2px;
      right: calc(50% - 12px);
      background: #FF6B8B;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      min-width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(255,107,139,0.3);
    }
    .tab-item.admin-tab { display: none; }
    /* ===== 猫咪卡片 ===== */
    .cat-card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(74,144,226,0.06);
      overflow: hidden;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      border: 1px solid rgba(232,233,234,0.2);
    }
    .cat-card:active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(74,144,226,0.04); }
    .cat-img-wrap {
      position: relative;
      padding-top: 56%;
      overflow: hidden;
      background: #f0f4fb;
    }
    .cat-img-wrap img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .cat-card:active .cat-img-wrap img { transform: scale(1.02); }
    .cat-status {
      position: absolute;
      top: 14px;
      left: 14px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 16px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      background: rgba(0,0,0,0.35);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .cat-fav {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cat-fav:active { transform: scale(0.88); }
    .cat-info { padding: 16px 18px 18px; }
    .cat-name { font-size: 20px; font-weight: 700; color: #1a2332; letter-spacing: -0.2px; }
    .cat-location { font-size: 13px; color: #7f8fa4; margin: 2px 0 6px; display: flex; align-items: center; gap: 4px; }
    .cat-desc { font-size: 14px; color: #4a5a6e; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .progress-section { margin-top: 14px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: #7f8fa4; font-weight: 500; }
    .progress-bar { height: 6px; background: #eef2f7; border-radius: 10px; margin-top: 6px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 10px; transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
    .progress-amount { font-size: 13px; color: #7f8fa4; margin-top: 6px; font-weight: 500; }
    .cat-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .cat-tags span {
      background: rgba(74,144,226,0.08);
      color: #4A90E2;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 14px;
      border-radius: 40px;
      letter-spacing: 0.2px;
    }
    /* ===== 搜索栏 ===== */
    .search-bar {
      padding: 0 16px 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-bar input {
      flex: 1;
      padding: 10px 16px;
      border: 2px solid #eef2f7;
      border-radius: 40px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      background: #fafcff;
      font-family: inherit;
    }
    .search-bar input:focus {
      border-color: #4A90E2;
      box-shadow: 0 0 0 4px rgba(74,144,226,0.08);
    }
    .search-bar input::placeholder { color: #b0c0d4; }
    .search-bar .search-clear {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #b0c0d4;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    .search-bar .search-clear:hover { color: #FF6B8B; }
    .search-bar .search-icon-btn {
      background: linear-gradient(135deg, #4A90E2, #7B5CFA);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(74,144,226,0.2);
      flex-shrink: 0;
    }
    .search-bar .search-icon-btn:active { transform: scale(0.92); }
    /* ===== 筛选 ===== */
    .filter-bar { display: flex; gap: 8px; padding: 0 16px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-bar .item {
      font-size: 13px;
      font-weight: 500;
      padding: 6px 18px;
      border-radius: 40px;
      background: #f0f4fb;
      color: #7f8fa4;
      cursor: pointer;
      transition: all 0.25s;
    }
    .filter-bar .item.active {
      background: linear-gradient(135deg, #4A90E2, #7B5CFA);
      color: #fff;
      box-shadow: 0 4px 16px rgba(74,144,226,0.2);
    }
    /* ===== 排序 ===== */
    .sort-select { padding: 0 16px 12px; text-align: right; }
    .sort-select select {
      padding: 6px 16px;
      border-radius: 40px;
      border: 1px solid #eef2f7;
      font-size: 14px;
      background: #fff;
      color: #1a2332;
      font-weight: 500;
      outline: none;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    /* ===== 轮播 ===== */
    .carousel {
      margin: 12px 16px;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 16/7;
      background: #f0f4fb;
      box-shadow: 0 8px 32px rgba(74,144,226,0.06);
    }
    .carousel-track { display: flex; transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); height: 100%; }
    .carousel-item { flex: 0 0 100%; height: 100%; position: relative; cursor: pointer; }
    .carousel-item img { width: 100%; height: 100%; object-fit: cover; }
    .carousel-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 18px;
      background: linear-gradient(transparent, rgba(0,0,0,0.45));
      color: #fff;
    }
    .carousel-overlay .name { font-size: 22px; font-weight: 700; text-shadow: 0 2px 12px rgba(0,0,0,0.2); }
    .carousel-dots {
      position: absolute;
      bottom: 14px;
      right: 18px;
      display: flex;
      gap: 8px;
    }
    .carousel-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: all 0.3s;
    }
    .carousel-dots span.active { background: #fff; transform: scale(1.2); }
    /* ===== 话题 ===== */
    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 16px;
      margin-bottom: 14px;
    }
    .topics span {
      background: rgba(255,107,139,0.06);
      color: #FF6B8B;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255,107,139,0.08);
    }
    .topics span:active { transform: scale(0.95); background: rgba(255,107,139,0.12); }
    /* ===== 详情页 ===== */
    .detail-cover {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #f0f4fb;
    }
    .detail-cover img { width: 100%; height: 100%; object-fit: cover; }
    .detail-content { padding: 16px; }
    .detail-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
      font-size: 14px;
      color: #4a5a6e;
    }
    .ring-wrap {
      display: flex;
      justify-content: center;
      margin: 16px 0;
    }
    .ring-wrap svg { width: 150px; height: 150px; }
    /* ===== 助养页 ===== */
    .amount-options {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 12px 0;
    }
    .amount-options button {
      flex: 1;
      min-width: 60px;
      padding: 12px 0;
      border: 2px solid #eef2f7;
      border-radius: 16px;
      background: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #1a2332;
    }
    .amount-options button.active {
      border-color: #4A90E2;
      background: rgba(74,144,226,0.06);
      color: #4A90E2;
      box-shadow: 0 4px 16px rgba(74,144,226,0.08);
    }
    .amount-options button:active { transform: scale(0.94); }
    .custom-amount {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
    .custom-amount input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #eef2f7;
      border-radius: 16px;
      font-size: 16px;
      max-width: 140px;
      outline: none;
      transition: border 0.2s;
      background: #fafcff;
    }
    .custom-amount input:focus { border-color: #4A90E2; }
    .input-group { margin: 12px 0; }
    .input-group textarea,
    .input-group input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #eef2f7;
      border-radius: 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
      background: #fafcff;
    }
    .input-group textarea:focus,
    .input-group input[type="text"]:focus { border-color: #4A90E2; }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
    }
    .toggle-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 500;
      color: #1a2332;
    }
    .toggle-row input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4A90E2;
    }
    /* ===== 个人中心 ===== */
    .profile-avatar-wrap {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 12px;
      cursor: pointer;
    }
    .profile-avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #4A90E2, #FF6B8B);
      font-size: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      box-shadow: 0 8px 32px rgba(74,144,226,0.15);
      object-fit: cover;
      overflow: hidden;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-avatar .default-avatar { font-size: 44px; }
    .profile-avatar-edit-hint {
      position: absolute;
      bottom: 0;
      right: 0;
      background: #4A90E2;
      color: #fff;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .profile-name-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .profile-name-row .name { font-size: 22px; font-weight: 700; }
    .profile-name-row .edit-name-btn {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #7f8fa4;
      padding: 0 4px;
    }
    .profile-level {
      color: #7f8fa4;
      margin-top: 4px;
      cursor: pointer;
      display: inline-block;
      padding: 2px 12px;
      border-radius: 30px;
      background: rgba(74,144,226,0.06);
      transition: background 0.2s;
    }
    .profile-level:active { background: rgba(74,144,226,0.12); }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
      text-align: center;
    }
    .stats-grid .num { font-size: 22px; font-weight: 700; color: #1a2332; }
    .stats-grid .label { font-size: 12px; color: #7f8fa4; margin-top: 2px; }
    .menu-item {
      display: flex;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f4fb;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
      color: #1a2332;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: #f0f4fb; }
    /* ===== 消息列表 ===== */
    .msg-item {
      display: flex;
      gap: 14px;
      padding: 14px 16px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(74,144,226,0.04);
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 4px solid transparent;
    }
    .msg-item.unread { border-left-color: #FF6B8B; background: rgba(255,107,139,0.02); }
    .msg-item:active { transform: scale(0.99); }
    .msg-item .dot { color: #FF6B8B; font-size: 12px; align-self: center; }
    .msg-item .msg-icon { font-size: 28px; }
    .msg-item .msg-body { flex: 1; }
    .msg-item .msg-title { font-weight: 600; }
    .msg-item .msg-content { font-size: 13px; color: #7f8fa4; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .msg-item .msg-time { font-size: 11px; color: #b0c0d4; margin-top: 4px; }
    /* ===== 空状态 ===== */
    .empty { text-align: center; padding: 60px 20px; color: #7f8fa4; }
    .empty .icon { font-size: 64px; display: block; margin-bottom: 12px; }
    .empty .sub { font-size: 14px; }
    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,35,50,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      padding: 12px 28px;
      border-radius: 40px;
      z-index: 999;
      font-size: 14px;
      font-weight: 500;
      max-width: 80%;
      text-align: center;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      transition: opacity 0.3s;
    }
    /* ===== 底部固定按钮（详情页） ===== */
    .donate-btn-fixed {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 420px;
      width: calc(100% - 32px);
      padding: 14px;
      background: linear-gradient(135deg, #FF6B8B, #FF8A9E);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      z-index: 50;
      box-shadow: 0 8px 32px rgba(255,107,139,0.3);
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }
    .donate-btn-fixed:active { transform: translateX(-50%) scale(0.96); opacity: 0.9; }
    /* ===== 模态框 ===== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.3s;
    }
    .modal-box {
      background: #fff;
      border-radius: 32px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.15);
      animation: slideUp 0.3s;
    }
    .modal-box .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; text-align: center; }
    .modal-box .modal-close {
      display: block;

    const map = { funding: '#4A90E2', in_progress: '#FF6B8B', completed: '#4CAF50' };
    return map[s] || '#7f8fa4';
  }
  function progressColor(p) {
    if (p < 30) return '#4A90E2';
    if (p < 70) return '#FF6B8B';
    return '#4CAF50';
  }
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.style.display = 'block';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toastEl.style.display = 'none'; }, 2000);
  }

  function getCats() { return catsData; }
  function getCat(id) { return catsData.find(c => c.id === id); }
  function getDonations(catId) { return donations.filter(d => d.catId === catId); }
  function getUserDonations() { return donations.filter(d => d.catId !== undefined); }
  function getFavCats() { return catsData.filter(c => user.favIds.includes(c.id)); }
  function getUnreadCount() { return messages.filter(m => !m.read).length; }
  function getTotalDonationAmount() { return donations.reduce((sum, d) => sum + d.amount, 0); }

  function getCatColor(cat) {
    const idx = cat.colorIndex !== undefined ? cat.colorIndex : (cat.id % CAT_COLORS.length);
    return CAT_COLORS[idx] || CAT_COLORS[0];
  }

  function generateCatPlaceholder(cat) {
    const color = getCatColor(cat);
    const bg = color.bg;
    const light = color.light;
    const emoji = color.emoji;
    const name = cat.name || '猫咪';
    return `data:image/svg+xml,${encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
        <defs>
          <linearGradient id="g${cat.id}" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="${bg}" stop-opacity="0.12" />
            <stop offset="100%" stop-color="${bg}" stop-opacity="0.20" />
          </linearGradient>
          <radialGradient id="r${cat.id}" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="${light}" stop-opacity="0.6" />
            <stop offset="100%" stop-color="${bg}" stop-opacity="0.05" />
          </radialGradient>
        </defs>
        <rect width="400" height="300" fill="${light}" />
        <rect width="400" height="300" fill="url(#r${cat.id})" />
        <text x="200" y="140" font-size="72" text-anchor="middle" dominant-baseline="central" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">${emoji}</text>
        <text x="200" y="225" font-size="20" fill="#2c3e50" text-anchor="middle" font-weight="700" font-family="sans-serif" letter-spacing="0.5">${name}</text>
        <rect x="140" y="245" width="120" height="3" rx="2" fill="${bg}" opacity="0.3" />
      </svg>
    `)}`;
  }

  function getCatAvatar(cat) {
    if (cat.avatarData && cat.avatarData.startsWith('data:image')) return cat.avatarData;
    return generateCatPlaceholder(cat);
  }
  function getCatCover(cat) {
    if (cat.coverData && cat.coverData.startsWith('data:image')) return cat.coverData;
    return generateCatPlaceholder(cat);
  }

  // ===== localStorage 持久化 =====
  function saveData() {
    try {
      localStorage.setItem('miaozhu_cats', JSON.stringify(catsData));
      localStorage.setItem('miaozhu_donations', JSON.stringify(donations));
      localStorage.setItem('miaozhu_user', JSON.stringify(user));
      localStorage.setItem('miaozhu_users', JSON.stringify(users));
      localStorage.setItem('miaozhu_messages', JSON.stringify(messages));
    } catch (e) { /* ignore */ }
  }

  function loadData() {
    try {
      const savedCats = localStorage.getItem('miaozhu_cats');
      if (savedCats) {
        const parsed = JSON.parse(savedCats);
        catsData.length = 0;
        parsed.forEach(c => catsData.push(c));
        catsData.forEach(c => { if (c.id >= nextId) nextId = c.id + 1; });
      }
      const savedDonations = localStorage.getItem('miaozhu_donations');
      if (savedDonations) {
        donations.length = 0;
        JSON.parse(savedDonations).forEach(d => donations.push(d));
      }
      const savedUser = localStorage.getItem('miaozhu_user');
      if (savedUser) {
        const parsed = JSON.parse(savedUser);
        Object.assign(user, parsed);
      }
      const savedUsers = localStorage.getItem('miaozhu_users');
      if (savedUsers) {
        users.length = 0;
        JSON.parse(savedUsers).forEach(u => users.push(u));
      }
      const savedMessages = localStorage.getItem('miaozhu_messages');
      if (savedMessages) {
        messages.length = 0;
        JSON.parse(savedMessages).forEach(m => messages.push(m));
      }
    } catch (e) { /* ignore */ }
  }

  function toggleFav(id) {
    const cat = getCat(id);
    if (!cat) return;
    cat.isFav = !cat.isFav;
    const idx = user.favIds.indexOf(id);
    if (cat.isFav) { if (idx === -1) user.favIds.push(id); }
    else { if (idx > -1) user.favIds.splice(idx, 1); }
    showToast(cat.isFav ? '❤️ 已收藏' : '已取消收藏');
    saveData();
    renderHome();
    renderProfile();
  }

      user.name = name;
      user.campus = campus || '计量大学';
      if (window._editAvatarData) {
        user.avatarData = window._editAvatarData;
        window._editAvatarData = null;
      }
      const idx = users.findIndex(u => u.id === user.id);
      if (idx > -1) {
        users[idx].name = user.name;
        users[idx].campus = user.campus;
        users[idx].avatarData = user.avatarData;
      }

      saveData();
      renderProfile();

  function renderHome() {
    const cats = getCats();
    // 轮播（仅在非发现模式显示）
    const carouselEl = document.querySelector('.carousel');
    const topicsEl2 = document.querySelector('.topics');
    if (isDiscoverMode) {
      carouselEl.style.display = 'none';
      topicsEl2.style.display = 'none';
      searchBar.style.display = 'flex';
    } else {
      carouselEl.style.display = 'block';
      topicsEl2.style.display = 'flex';
      searchBar.style.display = 'none';
      // 渲染轮播
      const featured = cats.filter(c => c.featured);
      if (featured.length) {
        carouselTrack.innerHTML = featured.map(c => `
          <div class="carousel-item" data-id="${c.id}">
            <img src="${getCatCover(c)}" alt="${c.name}" />
            <div class="carousel-overlay"><span class="name">${c.name}</span></div>
          </div>
        `).join('');
        carouselDots.innerHTML = featured.map((_, i) => `<span class="${i===slideIndex?'active':''}" data-index="${i}"></span>`).join('');
        carouselDots.querySelectorAll('span').forEach(el => {
          el.addEventListener('click', function(e) {
            e.stopPropagation();
            slideIndex = parseInt(this.dataset.index);
            updateCarousel();
          });
        });
        carouselTrack.querySelectorAll('.carousel-item').forEach(el => {
          el.addEventListener('click', function() {
            const id = parseInt(this.dataset.id);
            goDetail(id);
          });
        });
        updateCarousel();
      } else {
        carouselTrack.innerHTML = '';
        carouselDots.innerHTML = '';
      }
      // 话题
      const topics = ['TNR计划', '校园喵星人', '绝育行动', '爱心助养'];
      topicsEl.innerHTML = topics.map(t => `<span data-topic="${t}">#${t}</span>`).join('');
      topicsEl.querySelectorAll('span').forEach(el => {
        el.addEventListener('click', function() { showToast('话题: ' + this.dataset.topic); });
      });
    }

    // 筛选
    const filters = [
      { label: '全部', val: 'all' },
      { label: '募集中', val: 'funding' },
      { label: '进行中', val: 'in_progress' },
      { label: '已完成', val: 'completed' }
    ];
    filterBar.innerHTML = filters.map(f => `
      <span class="item ${curFilter === f.val ? 'active' : ''}" data-filter="${f.val}">${f.label}</span>
    `).join('');
    filterBar.querySelectorAll('.item').forEach(el => {
      el.addEventListener('click', function() {
        curFilter = this.dataset.filter;
        renderHome();
      });
    });

    // 排序
    sortSelect.value = curSort;
    sortSelect.onchange = function() {
      curSort = this.value;
      renderHome();
    };

    // 猫咪列表（应用搜索过滤）
    let list = [...cats];
    // 搜索过滤
    if (searchKeyword) {
      const kw = searchKeyword.toLowerCase();
      list = list.filter(c => 
        c.name.toLowerCase().includes(kw) ||
        c.tags.some(t => t.toLowerCase().includes(kw)) ||
        c.area.toLowerCase().includes(kw) ||
        c.summary.toLowerCase().includes(kw)
      );
    }
    // 状态筛选
    if (curFilter !== 'all') {
      list = list.filter(c => c.status === curFilter);
    }
    // 排序
    list.sort((a, b) => {
      const pa = a.current / a.target, pb = b.current / b.target;
      if (curSort === 'progress') return pb - pa;
      if (curSort === 'amount') return b.current - a.current;
      return 0;
    });

    if (list.length === 0) {
      let emptyMsg = searchKeyword ? `没有找到“${searchKeyword}”相关的猫咪` : '暂无猫咪';
      catList.innerHTML = `<div class="empty"><span class="icon">🐾</span><div>${emptyMsg}</div><div class="sub" style="margin-top:6px;font-size:13px;color:#b0c0d4;">${searchKeyword ? '试试其他关键词吧' : '等待新伙伴加入'}</div></div>`;
    } else {
      catList.innerHTML = list.map(c => `
        <div class="cat-card" data-id="${c.id}">
          <div class="cat-img-wrap">
            <img src="${getCatAvatar(c)}" alt="${c.name}" loading="lazy" />
            <span class="cat-status" style="background:${statusColor(c.status)}">${statusText(c.status)}</span>
            <button class="cat-fav" data-id="${c.id}">${c.isFav ? '❤️' : '🤍'}</button>
          </div>
          <div class="cat-info">
            <div class="cat-name">${c.name}</div>
            <div class="cat-location">📍 ${c.area}</div>
            <div class="cat-desc">${c.summary}</div>
            <div class="progress-section">
              <div class="progress-label"><span>绝育进度</span><span>${c.progress}%</span></div>
              <div class="progress-bar"><div class="progress-fill" style="width:${c.progress}%;background:${progressColor(c.progress)}"></div></div>
              <div class="progress-amount">已筹 ¥${c.current.toFixed(2)} / 目标 ¥${c.target.toFixed(2)}</div>
            </div>
            <div class="cat-tags">${c.tags.map(t => `<span>${t}</span>`).join('')}</div>
          </div>
        </div>
      `).join('');
      catList.querySelectorAll('.cat-card').forEach(el => {
        el.addEventListener('click', function() {
          const id = parseInt(this.dataset.id);
          goDetail(id);
        });
      });
      catList.querySelectorAll('.cat-fav').forEach(btn => {

  function goDonate(id) {
    const cat = getCat(id);
    if (!cat) return;
    currentCatId = id;
    currentPage = 'donate';
    donateCatAvatar.textContent = '🐱';
    donateCatName.textContent = cat.name;
    donateCatProgress.textContent = '进度 ' + cat.progress + '%';
    const amounts = [10, 20, 50, 100];
    amountOptions.innerHTML = amounts.map(a => `<button class="${selectedAmount === a ? 'active' : ''}" data-amount="${a}">¥${a}</button>`).join('');
    amountOptions.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', function() {
        selectedAmount = parseInt(this.dataset.amount);
        customAmountInput.value = '';
        customAmount = '';
        updateAmountUI();
        updateConfirmButton();
      });
    });
    customAmountInput.value = '';
    customAmountInput.oninput = function() {
      const val = parseFloat(this.value);
      if (!isNaN(val) && val >= 1 && val <= 1000) {
        selectedAmount = null;
        customAmount = val;
        amountOptions.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        updateConfirmButton();
      } else {
        if (this.value === '') {
          selectedAmount = 100;
          customAmount = '';
          updateAmountUI();
          updateConfirmButton();
        }
      }
    };
    messageTextarea.value = messageText || '';
    msgCount.textContent = messageTextarea.value.length;
    messageTextarea.oninput = function() {
      messageText = this.value;
      msgCount.textContent = this.value.length;
      if (this.value.length > 100) this.value = this.value.slice(0, 100);
    };
    isAnonymousCheck.checked = isAnonymous;
    donorNameWrap.style.display = isAnonymous ? 'none' : 'block';
    donorNameInput.value = donorName || '';
    isAnonymousCheck.onchange = function() {
      isAnonymous = this.checked;
      donorNameWrap.style.display = isAnonymous ? 'none' : 'block';
    };
    donorNameInput.oninput = function() { donorName = this.value; };
    updateConfirmButton();
    confirmDonate.onclick = submitDonation;
    showPage('donate');
    renderHeader();
  }

  function updateAmountUI() {
    amountOptions.querySelectorAll('button').forEach(btn => {
      const a = parseInt(btn.dataset.amount);
      btn.classList.toggle('active', a === selectedAmount);
    });
    if (selectedAmount !== null) {
      customAmountInput.value = '';
      customAmount = '';
    }
    updateConfirmButton();
  }

  function updateConfirmButton() {
    let amount = selectedAmount;
    if (customAmount !== '' && !isNaN(customAmount) && customAmount >= 1 && customAmount <= 1000) {
      amount = customAmount;
    }
    if (amount !== null && amount >= 1 && amount <= 1000) {
      confirmDonate.textContent = `确认助养 ¥${amount}`;
      confirmDonate.disabled = false;
    } else {
      confirmDonate.textContent = '请输入有效金额';
      confirmDonate.disabled = true;
    }
  }

  function submitDonation() {
    const cat = getCat(currentCatId);
    if (!cat) return;
    let amount = selectedAmount;
    if (customAmount !== '' && !isNaN(customAmount) && customAmount >= 1 && customAmount <= 1000) {
      amount = customAmount;
    }
    if (!amount || amount < 1 || amount > 1000) {
      showToast('请输入1-1000之间的金额');
      return;
    }
    cat.current += amount;
    cat.progress = Math.min(Math.round((cat.current / cat.target) * 100), 100);
    if (cat.progress >= 100) cat.status = 'completed';
    donations.push({
      id: Date.now(),
      catId: cat.id,
      name: isAnonymous ? '匿名同学' : (donorName || '爱心用户'),
      amount: amount,
      time: new Date().toLocaleString()
    });
    user.donationCount += 1;
    user.donationAmount += amount;
    const newLevel = getLevelByCount(user.donationCount);
    user.level = newLevel.level;
    const uidx = users.findIndex(u => u.id === user.id);
    if (uidx > -1) {
      users[uidx].donationCount = user.donationCount;
      users[uidx].donationAmount = user.donationAmount;
      users[uidx].level = user.level;
    }
    messages.unshift({
      id: Date.now(),
      icon: '❤️',
      title: `助养成功：${cat.name}`,
      content: `你为${cat.name}助养了¥${amount}，感谢你的爱心！当前进度已达到 ${cat.progress}%。`,
      time: new Date().toLocaleString(),
      read: false
    });
    saveData();
    showToast(`🎉 成功助养 ${cat.name} ${amount} 元！`);
    goDetail(cat.id);
  }

  // ============================================================
  // 页面切换
  // ============================================================
  function showPage(page) {
    Object.keys(pages).forEach(key => {
      pages[key].classList.toggle('active', key === page);
    });
    tabs.forEach(tab => {
      const p = tab.dataset.page;
      if (p === 'discover') {
        tab.classList.toggle('active', page === 'home' && isDiscoverMode);
      } else if (p === 'admin') {
        tab.classList.toggle('active', page === 'admin');
      } else {
        tab.classList.toggle('active', p === page);
      }
    });
    currentPage = page;
    renderHeader();
    if (page === 'admin' && isAdmin) {
      renderAdmin();
    }
  }

  // ============================================================
  // 事件绑定
  // ============================================================
  tabs.forEach(tab => {
    tab.addEventListener('click', function() {
      const page = this.dataset.page;
      if (page === 'home') {
        // 从发现模式回到首页模式
        if (isDiscoverMode) {
          isDiscoverMode = false;
          clearSearch();
          searchBar.style.display = 'none';
          document.querySelector('.carousel').style.display = 'block';
          document.querySelector('.topics').style.display = 'flex';
          renderHome();
        }
        if (currentPage === 'detail' || currentPage === 'donate') {
          showPage('home');
          renderHome();
        } else {
          showPage('home');
          renderHome();
        }
      } else if (page === 'discover') {
        // 进入发现模式：显示搜索栏，隐藏轮播和话题
        isDiscoverMode = true;
        currentPage = 'home';
        // 重置筛选和搜索
        curFilter = 'all';
        searchKeyword = '';
        searchInput.value = '';
        searchClear.style.display = 'none';
        renderHome();
        // 显示搜索栏，隐藏轮播和话题
        document.querySelector('.carousel').style.display = 'none';
        document.querySelector('.topics').style.display = 'none';
        searchBar.style.display = 'flex';
        // 聚焦搜索框
        setTimeout(() => searchInput.focus(), 100);
        showPage('home');
        showToast('🔍 输入关键词搜索猫咪');
      } else if (page === 'profile') {
        showPage('profile');
        renderProfile();
      } else if (page === 'donate') {
        if (currentCatId) {
          goDonate(currentCatId);
        } else {
          showToast('请先在首页选择一只猫咪');
        }
      } else if (page === 'admin') {
        if (isAdmin) {
          showAdminPage();
        } else {
          showToast('请先登录管理员账号');
        }
      }
    });
  });

  // 搜索事件
  searchInput.addEventListener('input', function() {
    performSearch(this.value);
  });
  searchClear.addEventListener('click', clearSearch);
  searchGoBtn.addEventListener('click', function() {
    performSearch(searchInput.value);
  });
  // 回车触发搜索
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      performSearch(this.value);
    }
  });

  backBtn.addEventListener('click', function() {
    if (currentPage === 'detail' || currentPage === 'donate') {
      showPage('home');
      renderHome();
    } else if (currentPage === 'admin') {
      showPage('profile');
      renderProfile();
    } else if (currentPage === 'messages') {
      showPage('home');
      renderHome();
    }
  });

  msgBtn.addEventListener('click', function() {
    showPage('messages');
    renderMessages();
  });

  // 个人中心事件
  simulateLoginBtn.addEventListener('click', function() {
    const defaultUser = users.find(u => u.id === 1);
    if (defaultUser) {
      Object.assign(user, defaultUser);
      isLoggedIn = true;
      saveData();
      renderProfile();
      renderHome();
      showToast('✅ 模拟登录成功');
    } else {
      showToast('❌ 默认用户不存在');
    }
  });

  logoutBtn.addEventListener('click', function() {
    isLoggedIn = false;
    if (isAdmin) {
      isAdmin = false;
      adminTab.style.display = 'none';
      showToast('已退出管理员');
    }
    showToast('已退出');
    renderProfile();
  });

  loginBtn.addEventListener('click', showLogin);
  registerBtn.addEventListener('click', showRegister);

  myDonations.addEventListener('click', function() {
    const records = getUserDonations();
    if (records.length === 0) {
      showModal('📋 我的助养记录', '<div style="color:#7f8fa4;text-align:center;padding:20px;">还没有助养记录，去帮助一只猫咪吧！</div>');
      return;
    }
    let html = `<div style="max-height:50vh;overflow-y:auto;">`;
    records.forEach(r => {
      const cat = getCat(r.catId);
      const name = cat ? cat.name : '未知猫咪';
      html += `<div class="modal-item"><span>🐱 ${name}</span><span>¥${r.amount.toFixed(2)} <span style="color:#7f8fa4;font-size:12px;">${r.time || ''}</span></span></div>`;
    });
    html += `</div>`;
    showModal('📋 我的助养记录', html);
  });
  myFavorites.addEventListener('click', function() {
    const favs = getFavCats();
    if (favs.length === 0) {
      showModal('❤️ 我的收藏', '<div style="color:#7f8fa4;text-align:center;padding:20px;">还没有收藏猫咪，去发现喜欢的猫咪吧！</div>');
      return;
    }
    let html = `<div style="max-height:50vh;overflow-y:auto;">`;
    favs.forEach(c => {
      html += `<div class="modal-item"><span>🐱 ${c.name}</span><span style="color:#4A90E2;font-weight:500;">进度 ${c.progress}%</span></div>`;
    });
    html += `</div>`;
    showModal('❤️ 我的收藏', html);
  });
  changePassword.addEventListener('click', function() {
    if (!isLoggedIn) { showToast('请先登录'); return; }
    showChangePassword();
  });
  aboutUs.addEventListener('click', function() { showToast('喵助 - 校园流浪猫TNR助养平台 v1.0'); });
  adminEntry.addEventListener('click', function() {
    if (isAdmin) {
      showAdminPage();
    } else {
      showAdminLogin();
    }
  });

  editNameBtn.addEventListener('click', function() {
    if (!isLoggedIn) { showToast('请先登录'); return; }
    showEditProfile();
  });
  avatarEditTrigger.addEventListener('click', function() {
    if (!isLoggedIn) { showToast('请先登录'); return; }
    showEditProfile();
  });
  profileLevelTrigger.addEventListener('click', showLevelDetail);

  if (isAdmin) {
    adminTab.style.display = 'flex';
  }

  // ============================================================
  // 轮播自动播放
  // ============================================================
  function startSlide() {
    if (slideTimer) clearInterval(slideTimer);
    slideTimer = setInterval(() => {
      const featured = getCats().filter(c => c.featured);
      if (featured.length > 1 && currentPage === 'home' && !isDiscoverMode) {
        slideIndex = (slideIndex + 1) % featured.length;
        updateCarousel();
      }
    }, 4000);
  }

  // ============================================================
  // 初始化
  // ============================================================
  function init() {
    loadData();
    // 默认首页模式
    isDiscoverMode = false;
    searchBar.style.display = 'none';
    document.querySelector('.carousel').style.display = 'block';
    document.querySelector('.topics').style.display = 'flex';
    renderHome();
    renderProfile();
    renderMessages();
    showPage('home');
    startSlide();
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        if (slideTimer) clearInterval(slideTimer);
      } else {
        startSlide();
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
